function openStatusModal(detail){
  const modal = document.getElementById('statusModal');
  if(!modal || !detail) return;

  const signalClass = COLORS[detail.signal] || 'blue';
  const label = SIGNAL_LABEL[detail.signal] || (detail.signal || '-');

  // 헤더: eyebrow + 큰 제목 + 배지
  document.getElementById('statusModalTitle').textContent = detail.title || 'Status';
  const badge = document.getElementById('statusModalBadge');
  badge.innerHTML = '<i class="dot ' + signalClass + '"></i><span>' + esc(label) + '</span>';

  // 기간 처리
  let periodKey = 'Pending Period';
  let periodVal = '-';
  let periodMuted = true;
  if(detail.signal === 'Green'){
    periodKey = 'Publishing Date';
    const pub = detail.periodText ? String(detail.periodText).replace(/^Publishing Date:\s*/i,'') : '';
    if(pub){ periodVal = esc(pub); periodMuted = false; }
  } else if(detail.aging !== '' && detail.aging !== null && detail.aging !== undefined){
    periodVal = esc(String(detail.aging)) + ' day' + (Number(detail.aging) === 1 ? '' : 's');
    periodMuted = false;
  }

  const cancelCount = Number(detail.cancelCount || 0);
  let pageVal = detail.pgTotal ? Number(detail.pgTotal).toLocaleString() : '-';
  if(cancelCount > 0){
    pageVal += ' (' + cancelCount.toLocaleString() + ' Cancelled)';
  }
  const countryDisplay = getCountryName(detail.country) || detail.country || '-';

  // Complete 상태는 DAM 대신 Live URL 표시, 그 외 상태는 DAM 표시
  const isCompleteStatus = detail.signal === 'Green' || String(detail.title || '').toLowerCase() === 'complete';
  let linkKey = isCompleteStatus ? 'Live URL' : 'DAM';
  let linkVal = '<span class="muted">-</span>';
  const liveUrls = extractUrls(detail.liveUrls && detail.liveUrls.length ? detail.liveUrls : (detail.liveUrl || ''));
  const damUrl = String(detail.dam || '').trim();
  if(isCompleteStatus){
    linkVal = liveUrlListHtml(liveUrls);
  } else if(/^https?:\/\//i.test(damUrl)){
    linkVal = '<a href="' + esc(damUrl) + '" target="_blank" rel="noopener" style="color:var(--lg-heritage-red);font-weight:700;text-decoration:none">Open DAM Link ↗</a>';
  }

  const rows = [
    rowHtml('Country',        esc(countryDisplay),          !countryDisplay),
    rowHtml('Request Title',  esc(detail.division || '-'),  !detail.division),
    rowHtml('Request Name',   esc(detail.model    || '-'),  !detail.model),
    rowHtml('Status',         esc(detail.title    || '-'),  !detail.title),
    rowHtml(periodKey,        periodVal,                     periodMuted),
    rowHtml('Page Count',     esc(pageVal),                  !detail.pgTotal),
    rowHtml(linkKey,          linkVal,                       false)
  ].join('');

  document.getElementById('statusModalBody').innerHTML = rows;
  modal.querySelectorAll('.detail-copy-btn').forEach(function(b){ b.remove(); });
  modal.classList.add('show');

  const tip = document.getElementById('floatingTooltip');
  if(tip){ tip.style.display = 'none'; tip.textContent = ''; }
}

function bindFloatingTooltips(){
  const tooltipEl = document.getElementById('floatingTooltip');
  if(!tooltipEl) return;

  const positionTooltip = e => {
    const offset = 14;
    tooltipEl.style.display = 'block';

    const rect = tooltipEl.getBoundingClientRect();
    let left = e.clientX + offset;
    let top = e.clientY + offset;

    if(left + rect.width > window.innerWidth - 8){
      left = e.clientX - rect.width - offset;
    }
    if(top + rect.height > window.innerHeight - 8){
      top = e.clientY - rect.height - offset;
    }

    tooltipEl.style.left = `${Math.max(8, left)}px`;
    tooltipEl.style.top = `${Math.max(8, top)}px`;
  };

  document.querySelectorAll('.tooltip[data-tip]').forEach(el => {
    el.addEventListener('mouseenter', e => {
      tooltipEl.textContent = el.getAttribute('data-tip') || '';
      positionTooltip(e);
    });
    el.addEventListener('mousemove', positionTooltip);
    el.addEventListener('mouseleave', () => {
      tooltipEl.style.display = 'none';
      tooltipEl.textContent = '';
    });
  });
}

          <div style="color:#fff;font-size:14px;font-weight:700;margin-bottom:3px;">${filename}</div>
          <div style="color:rgba(255,255,255,.6);font-size:12px;">💡 ${hint}</div>
        </div>
        <button onclick="document.getElementById('imgPreviewModal').remove()"
          style="background:rgba(255,255,255,.15);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;padding:8px 16px;cursor:pointer;">✕ 닫기</button>
      </div>
      <img src="${dataUrl}" alt="table preview"
        style="width:100%;border-radius:10px;display:block;box-shadow:0 8px 40px rgba(0,0,0,.5);"
        draggable="true" />
    </div>
  `;

  // 배경 클릭 닫기
  modal.addEventListener('click', e => { if(e.target === modal) modal.remove(); });
  document.body.appendChild(modal);
}

// Captures the full element as PNG including content hidden by scroll/overflow.
async function captureElementToPng(sourceEls, getFilename){
  if(typeof html2canvas === 'undefined'){
    console.error('html2canvas not loaded');
    return;
  }

  const elements = Array.isArray(sourceEls) ? sourceEls : [sourceEls];
  const CAPTURE_PADDING = 20;

  // wrapper는 캔버스 전체 크기, inner는 실제 콘텐츠 위치를 담당합니다.
  // 기존처럼 transform으로 보정하면 html2canvas에서 좌/상단 여백이 0처럼 잘리는 경우가 있어
  // 콘텐츠 자체를 20px 위치에 고정하고 wrapper 크기만 콘텐츠에 맞춰 계산합니다.
  const wrapper = document.createElement('div');
  wrapper.className = 'capture-clone';
  wrapper.style.position   = 'absolute';
  wrapper.style.left        = '0';
  wrapper.style.top         = '0';
  wrapper.style.zIndex      = '2147483647';
  wrapper.style.background  = '#F5F6FA';
  wrapper.style.padding     = '0';
  wrapper.style.margin      = '0';
  wrapper.style.display     = 'block';
  wrapper.style.overflow    = 'hidden';
  wrapper.style.fontSize    = '13px';
  wrapper.style.lineHeight  = '1.35';
  wrapper.style.maxWidth    = 'none';
  wrapper.style.width       = 'auto';
  wrapper.style.height      = 'auto';

  const captureStyle = document.createElement('style');
  captureStyle.textContent = `
    .capture-clone, .capture-clone *{font-size:13px !important; box-sizing:border-box !important;}
    .capture-clone{display:block !important; max-width:none !important; overflow:hidden !important;}
    .capture-inner{position:absolute !important; left:${CAPTURE_PADDING}px !important; top:${CAPTURE_PADDING}px !important; display:inline-block !important; width:auto !important; min-width:0 !important; max-width:none !important; overflow:visible !important;}
    .capture-clone th, .capture-clone td{padding:8px 10px !important;}
    .capture-clone .matrix-card, .capture-clone .detail-card{display:block !important; width:max-content !important; min-width:max-content !important; max-width:none !important; overflow:visible !important; margin-left:0 !important; margin-right:0 !important;}
    .capture-clone .guide-card{width:100% !important; min-width:0 !important; max-width:none !important; box-sizing:border-box !important;}
    .capture-clone .summary-card{width:max-content !important; min-width:max-content !important; max-width:none !important;}
    .capture-clone .guide-grid{width:100% !important;}
    .capture-clone .matrix-wrap, .capture-clone .detail-scroll{display:block !important; width:max-content !important; min-width:max-content !important; max-width:none !important; max-height:none !important; overflow:visible !important;}
    .capture-clone table:not(.mx-table){width:max-content !important; min-width:max-content !important; max-width:none !important; table-layout:auto !important;}
    .capture-clone table.mx-table{table-layout:fixed !important; border-collapse:collapse !important; width:var(--capture-table-width) !important; min-width:var(--capture-table-width) !important; max-width:var(--capture-table-width) !important;}
    .capture-clone .mx-table th.mx-country-head, .capture-clone .mx-table td.mx-country-cell{width:var(--capture-country-col-width) !important; min-width:var(--capture-country-col-width) !important; max-width:var(--capture-country-col-width) !important;}
    .capture-clone .mx-table th.mx-req-head, .capture-clone .mx-table td.mx-cell, .capture-clone .mx-table td.mx-data, .capture-clone .mx-table td.mx-article, .capture-clone .mx-table td.mx-authority, .capture-clone .mx-table td.mx-empty{width:var(--capture-req-col-width) !important; min-width:var(--capture-req-col-width) !important; max-width:var(--capture-req-col-width) !important;}
    .capture-clone th, .capture-clone td{position:static !important; left:auto !important; right:auto !important; z-index:auto !important;}
    .capture-clone th::after, .capture-clone td::after{display:none !important;}
  `;
  wrapper.appendChild(captureStyle);

  const inner = document.createElement('div');
  inner.className = 'capture-inner';
  wrapper.appendChild(inner);

  elements.forEach((sourceEl, idx) => {
    if(!sourceEl) return;
    const clone = sourceEl.cloneNode(true);
    clone.removeAttribute('id');
    if(idx < elements.length - 1) clone.style.marginBottom = '14px';

    clone.querySelectorAll('th.dam, td.dam').forEach(cell => cell.remove());
    clone.querySelectorAll('.download-image-btn, .table-download-btn').forEach(btn => btn.remove());

    clone.style.overflow  = 'visible';
    clone.style.maxWidth  = 'none';
    clone.style.maxHeight = 'none';
    clone.style.width     = 'max-content';
    clone.style.height    = 'auto';

    clone.querySelectorAll('.matrix-wrap, .detail-scroll').forEach(area => {
      area.style.overflow  = 'visible';
      area.style.maxHeight = 'none';
      area.style.maxWidth  = 'none';
      area.style.height    = 'auto';
      area.style.width     = 'max-content';
    });
    clone.querySelectorAll('.matrix-card, .detail-card').forEach(card => {
      card.style.overflow  = 'visible';
      card.style.maxWidth  = 'none';
      card.style.maxHeight = 'none';
      card.style.width     = 'max-content';
    });
    clone.querySelectorAll('.col-region, .col-country, .mx-country-head, .mx-country-cell, .mx-region-cell').forEach(c => {
      c.style.position = 'static';
      c.style.left = 'auto';
      c.style.right = 'auto';
    });

    inner.appendChild(clone);
  });

  document.body.appendChild(wrapper);

  const prevScrollX = window.scrollX;
  const prevScrollY = window.scrollY;
  const prevBodyOverflow = document.body.style.overflow;
  const prevHtmlOverflow = document.documentElement.style.overflow;

  document.body.style.overflow = 'visible';
  document.documentElement.style.overflow = 'visible';
  window.scrollTo(0, 0);

  try{
    if(document.fonts && document.fonts.ready){
      try{ await document.fonts.ready; }catch(e){}
    }
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    // Matrix/Table의 실제 가로폭을 먼저 계산한 뒤,
    // 다운로드 이미지에서는 Country 열을 제외한 나머지 열이 모두 동일한 폭이 되도록 고정합니다.
    let targetContentWidth = 0;
    inner.querySelectorAll('.matrix-card, .detail-card, .matrix-wrap, .detail-scroll, table').forEach(el => {
      const r = el.getBoundingClientRect();
      const sw = el.scrollWidth || 0;
      targetContentWidth = Math.max(targetContentWidth, Math.ceil(r.width), Math.ceil(sw));
    });

    inner.querySelectorAll('table.mx-table').forEach(table => {
      const reqHeads = Array.from(table.querySelectorAll('th.mx-req-head'));
      if(!reqHeads.length) return;

      const countryHead = table.querySelector('th.mx-country-head');
      const measuredCountryWidth = countryHead ? countryHead.getBoundingClientRect().width : 0;
      const countryColWidth = Math.max(110, Math.ceil(measuredCountryWidth || 120));

      const measuredTableWidth = Math.max(
        Math.ceil(table.getBoundingClientRect().width || 0),
        Math.ceil(table.scrollWidth || 0),
        Math.ceil(targetContentWidth || 0)
      );
      const reqColWidth = Math.max(104, Math.ceil((measuredTableWidth - countryColWidth) / reqHeads.length));
      const finalTableWidth = countryColWidth + (reqColWidth * reqHeads.length);

      table.style.setProperty('--capture-country-col-width', countryColWidth + 'px');
      table.style.setProperty('--capture-req-col-width', reqColWidth + 'px');
      table.style.setProperty('--capture-table-width', finalTableWidth + 'px');
      table.style.width = finalTableWidth + 'px';
      table.style.minWidth = finalTableWidth + 'px';
      table.style.maxWidth = finalTableWidth + 'px';
      table.style.tableLayout = 'fixed';

      table.querySelectorAll('colgroup').forEach(colgroup => colgroup.remove());
      const colgroup = document.createElement('colgroup');
      const countryCol = document.createElement('col');
      countryCol.style.width = countryColWidth + 'px';
      colgroup.appendChild(countryCol);
      reqHeads.forEach(() => {
        const col = document.createElement('col');
        col.style.width = reqColWidth + 'px';
        colgroup.appendChild(col);
      });
      table.insertBefore(colgroup, table.firstChild);

      if(finalTableWidth > targetContentWidth) targetContentWidth = finalTableWidth;
    });

    if(targetContentWidth > 0){
      inner.style.width = targetContentWidth + 'px';
      inner.style.minWidth = targetContentWidth + 'px';
      inner.style.maxWidth = 'none';

      inner.querySelectorAll('.guide-card').forEach(card => {
        card.style.width = '100%';
        card.style.minWidth = '0';
        card.style.maxWidth = 'none';
        card.style.boxSizing = 'border-box';
        card.style.marginLeft = '0';
        card.style.marginRight = '0';
      });
      inner.querySelectorAll('.guide-grid').forEach(grid => {
        grid.style.width = '100%';
        grid.style.boxSizing = 'border-box';
      });
    }

    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    // inner의 좌상단은 항상 20px이며, 하위 요소가 실제로 차지하는 우/하단 끝까지 계산합니다.
    const innerRect = inner.getBoundingClientRect();
    let maxRight = innerRect.right;
    let maxBottom = innerRect.bottom;

    Array.from(inner.children).forEach(el => {
      const rect = el.getBoundingClientRect();
      if(rect.width || rect.height){
        maxRight = Math.max(maxRight, rect.right);
        maxBottom = Math.max(maxBottom, rect.bottom);
      }
      el.querySelectorAll('*').forEach(child => {
        const r = child.getBoundingClientRect();
        if(r.width || r.height){
          maxRight = Math.max(maxRight, r.right);
          maxBottom = Math.max(maxBottom, r.bottom);
        }
      });
    });

    const contentW = Math.ceil(maxRight - innerRect.left);
    const contentH = Math.ceil(maxBottom - innerRect.top);
    const w = contentW + (CAPTURE_PADDING * 2);
    const h = contentH + (CAPTURE_PADDING * 2);

    // 캔버스 기준 사이즈를 실제 콘텐츠 + 사방 20px로 고정합니다.
    wrapper.style.width = w + 'px';
    wrapper.style.height = h + 'px';
    wrapper.style.minWidth = w + 'px';
    wrapper.style.maxWidth = 'none';
    wrapper.style.minHeight = h + 'px';

    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    const MAX_DIM = 12000;
    let scale = 2;
    if(w * scale > MAX_DIM || h * scale > MAX_DIM){
      scale = Math.max(1, Math.min(MAX_DIM / w, MAX_DIM / h));
    }

    const canvas = await html2canvas(wrapper, {
      scale,
      backgroundColor: '#F5F6FA',
      useCORS: true,
      logging: false,
      width: w,
      height: h,
      x: 0,
      y: 0,
      scrollX: 0,
      scrollY: 0,
      windowWidth:  w,
      windowHeight: h
    });

    await downloadCanvas(canvas, getFilename());
  }catch(err){
    console.error('Image capture failed:', err);
  }finally{
    document.body.removeChild(wrapper);
    document.body.style.overflow = prevBodyOverflow;
    document.documentElement.style.overflow = prevHtmlOverflow;
    window.scrollTo(prevScrollX, prevScrollY);
  }
}

async function downloadMatrixTableImage(){
  const guideEl = document.querySelector('.guide-card');
  const tableEl = document.getElementById('matrixTableArea');
  if(!tableEl) return;
  await captureElementToPng([guideEl, tableEl], () => {
    const label = selectedMatrixCountries.length
      ? selectedMatrixCountries.join('_')
      : 'all_countries';
    return `status_dashboard_${label.replace(/[^a-z0-9._()-]+/gi,'_')}.png`;
  });
}

async function downloadCountryImage(){
  if(!selectedCountry) return;
  const el = document.getElementById('countryDetail');
  if(!el) return;
  await captureElementToPng(el, () => {
    return `status_dashboard_${selectedCountry.replace(/[^a-z0-9._()-]+/gi,'_')}_detail.png`;
  });
}
